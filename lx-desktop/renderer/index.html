<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>冷小北 · 自进化</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="side">
      <div class="brand">
        <div class="brand-mark">LX</div>
        <div>
          <h1>冷小北</h1>
          <p>Self-Evolution MVP</p>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-view="evolve">自进化</button>
        <button class="nav-btn" data-view="lessons">Lessons</button>
        <button class="nav-btn" data-view="runs">Runs</button>
        <button class="nav-btn" data-view="status">状态</button>
      </nav>
    </aside>

    <main class="main">
      <section class="topbar">
        <div>
          <h2 id="view-title">自进化控制台</h2>
          <p id="view-subtitle">学习其他 Agent 的长处，转成一次小步源码改进。</p>
        </div>
        <button id="refresh-btn" class="icon-btn" title="刷新">↻</button>
      </section>

      <section id="evolve" class="view active">
        <div class="panel command-panel">
          <label for="topic">学习方向</label>
          <textarea id="topic" rows="4" placeholder="例如：学习 Claude Code 的任务规划能力"></textarea>

          <label for="url">参考 URL（可选）</label>
          <input id="url" type="url" placeholder="https://github.com/All-Hands-AI/OpenHands">

          <div class="actions">
            <button id="run-btn" class="primary-btn">学习并自进化</button>
            <button id="learn-btn" class="secondary-btn">只生成 Lesson</button>
            <button id="apply-btn" class="secondary-btn">应用 Pending</button>
          </div>
        </div>

        <div class="grid two">
          <div class="panel">
            <div class="panel-head">
              <h3>运行结果</h3>
              <span id="run-state" class="pill">idle</span>
            </div>
            <pre id="result-box" class="output">等待指令。</pre>
          </div>

          <div class="panel">
            <h3>最小边界</h3>
            <ul class="rules">
              <li>不自主修改 SOUL / CONSTITUTION</li>
              <li>核心入口、执行器、权限、进化引擎需要确认</li>
              <li>每次修改后运行编译与核心测试</li>
              <li>失败复用现有进化引擎回滚</li>
            </ul>
          </div>
        </div>
      </section>

      <section id="lessons" class="view">
        <div class="panel">
          <div class="panel-head">
            <h3>Agent Lessons</h3>
            <span id="lesson-count" class="pill">0</span>
          </div>
          <div id="lesson-list" class="list"></div>
        </div>
      </section>

      <section id="runs" class="view">
        <div class="panel">
          <div class="panel-head">
            <h3>Self-Evolution Runs</h3>
            <span id="run-count" class="pill">0</span>
          </div>
          <div id="run-list" class="list"></div>
        </div>
      </section>

      <section id="status" class="view">
        <div class="grid two">
          <div class="panel">
            <h3>系统状态</h3>
            <pre id="status-box" class="output compact">加载中...</pre>
          </div>
          <div class="panel">
            <h3>健康检查</h3>
            <pre id="health-box" class="output compact">加载中...</pre>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
