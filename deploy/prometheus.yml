# =============================================================================
# Prometheus Configuration for LengXiaobei
# =============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  # LengXiaobei metrics
  - job_name: 'lengxiaobei'
    static_configs:
      - targets: ['lengxiaobei:8081']
    metrics_path: /metrics
    scrape_interval: 10s

  # Qdrant vector database
  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
    scrape_interval: 30s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
