# 冷小北默认配置

# 系统配置
system:
  name: "冷小北"
  version: "1.0.0"
  description: "AI 驱动的自主编程助手"
  environment: "development"
  debug: true

# 服务器配置
server:
  host: "localhost"
  port: 8000
  timeout: 30

# MCP 服务器配置
mcp:
  enabled: true
  command: ["python3", "src/mcp_server.py"]
  cwd: "${workspaceFolder}"
  env:
    PYTHONPATH: "${workspaceFolder}"

# 进化引擎配置
evolution:
  enabled: true
  max_iterations: 10
  timeout: 60
  auto_commit: false

# 自主运行配置
autonomous:
  enabled: true                 # 是否允许自主进化
  cooldown_seconds: 600         # 进化冷却时间
  max_per_cycle: 3              # 每次最多执行几个改进
  degraded_mode: "observe"      # LLM 不可用时的行为: observe(仅观察记录) | skip(跳过) | error(报错)
  idle_threshold_seconds: 300   # 空闲多久后允许自主巡检

# 日志配置
logging:
  level: "INFO"
  log_dir: "logs"
  max_bytes: 10485760  # 10MB
  backup_count: 5

# 监控配置
monitoring:
  enabled: true
  interval: 60  # 秒
  alerts:
    cpu_threshold: 80
    memory_threshold: 85
    disk_threshold: 90

# 性能配置
performance:
  cache_enabled: true
  cache_size: 100
  async_enabled: true
  max_workers: 4

# 安全配置
security:
  enable_cors: true
  allowed_origins: ["*"]
  rate_limit:
    enabled: false
    max_requests: 100
    window_seconds: 60

# 模型配置
models:
  # API Key 读取顺序: 环境变量 → 本文件 providers → ~/.openclaw/openclaw.json
  providers:
    # minimax:
    #   api_key: "sk-xxx"
    # volcengine:
    #   api_key: "xxx"
    # bailian:
    #   api_key: "xxx"
    # anthropic:
    #   api_key: "sk-ant-xxx"

  # 启用的模型列表（注释即禁用）
  enabled:
    - "minimax/MiniMax-M2.7"
    - "volcengine/doubao-seed-2.0-pro"
    - "volcengine/deepseek-v3.2"
    - "bailian/qwen3.5-plus"
    - "bailian/qwen3-coder-plus"

  # 全局参数
  default: "minimax/MiniMax-M2.7"
  temperature: 0.7
  max_tokens: 4096
  timeout: 120
  max_retries: 2

# 工具配置
tools:
  enabled: true
  timeout: 30
  max_retries: 3

# 记忆配置
memory:
  enabled: true
  max_size: 1000
  retention_days: 30

# 宪法配置
constitution:
  enabled: true
  files:
    - "SOUL.md"
    - "IDENTITY.md"
    - "USER.md"
    - "CONSTITUTION.md"
