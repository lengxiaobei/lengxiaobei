# 冷小北生产环境配置

# 系统配置
system:
  environment: "production"
  debug: false

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8000

# 进化引擎配置
evolution:
  auto_commit: false

# 日志配置
logging:
  level: "INFO"

# 监控配置
monitoring:
  enabled: true
  interval: 60  # 秒

# 安全配置
security:
  enable_cors: true
  allowed_origins: ["*"]
  rate_limit:
    enabled: true
    max_requests: 100
    window_seconds: 60
